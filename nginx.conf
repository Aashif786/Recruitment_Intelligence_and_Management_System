user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Docker internal DNS resolver – resolves upstream hostnames dynamically
    # instead of at nginx startup, preventing crash loops
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Rate limiting pools
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    upstream frontend {
        server frontend_blue:3000;
    }

    upstream backend {
        server backend_blue:10000;
    }

    # NOTE: SSL is terminated by the host nginx (caldimproducts.com).
    # This Docker nginx sits behind it on port 9999 (HTTP only).
    server {
        listen 80;
        server_name caldimproducts.com;

        # Global Redirects to /calrims namespace
        location = /support { return 301 /calrims/support; }
        location = /terms   { return 301 /calrims/terms;   }
        location = /privacy { return 301 /calrims/privacy; }
        location = /offer   { return 301 /calrims/offer;   }
        location = /company { return 301 /calrims/company; }

        # Frontend Routes
        location /calrims {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Specific exemption: PDF generation is handled by Next.js API route
        location ^~ /calrims/api/generate-pdf {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Specific exemption: Health check is handled by Next.js API route
        location ^~ /calrims/api/health {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # BUG-040 Fix: Hardened limit for large media uploads during interviews to 50m (was 160m).
        # limit_rate and limit_rate_after prevent bandwidth starvation by throttling after initial chunk.
        location ~ ^/calrims/api/interviews/[0-9]+/(?:upload-video|transcribe) {
            client_max_body_size 50m;
            limit_rate_after 10m;
            limit_rate 2m;
            
            limit_req zone=api burst=20 nodelay;
            rewrite ^/calrims/api/api/(.*) /api/$1 break;
            rewrite ^/calrims/api/(.*) /api/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Fallback general interviews route (P2-L06)
        location /calrims/api/interviews {
            client_max_body_size 50m;
            rewrite ^/calrims/api/(.*)/$      /api/$1 break;
            rewrite ^/calrims/api/(.*)      /api/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Applications route with 10m body limit
        location /calrims/api/applications {
            client_max_body_size 10m;
            rewrite ^/calrims/api/(.*)/$      /api/$1 break;
            rewrite ^/calrims/api/(.*)      /api/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
        location /calrims/api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/calrims/api/api/(.*)/$ /api/$1 break;
            rewrite ^/calrims/api/api/(.*) /api/$1 break;
            rewrite ^/calrims/api/(.*)/$      /api/$1 break;
            rewrite ^/calrims/api/(.*)      /api/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # WebSocket Routes
        location /calrims/ws/ {
            rewrite ^/calrims/ws/(.*) /ws/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
