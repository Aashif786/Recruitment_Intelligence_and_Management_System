name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Enforce manual approval rule using GitHub Environments (P2-L01)
    # Recommendation: Rotate the VPS_SSH_KEY quarterly and use repository-scoped deploy keys.
    environment:
      name: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            cd /var/www/rims
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy-zero-downtime.sh
            bash ./deploy-zero-downtime.sh
