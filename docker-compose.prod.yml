version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"   # Host nginx proxies caldimproducts.com/calrims → localhost:9999
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL is terminated by the host nginx — no certs needed here
    # NOTE: No depends_on health-gate here. nginx uses Docker's internal DNS resolver
    # (resolver 127.0.0.11 valid=10s) which handles upstream changes dynamically at runtime.
    # A blue-only health gate would block restarts during green deployments and vice versa.
    restart: always

  # --- BLUE ENVIRONMENT ---
  frontend_blue:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/calrims/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  backend_blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - BACKEND_START_MODE=docker
      - FRONTEND_BASE_URL=https://caldimproducts.com/calrims
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Startup migrations can take 30-60s on first run; give them time before
      # the health-check loop begins to avoid premature "unhealthy" signals.
      start_period: 60s
    restart: always

  # --- GREEN ENVIRONMENT ---
  frontend_green:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://caldimproducts.com/calrims
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/calrims/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  backend_green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - BACKEND_START_MODE=docker
      - FRONTEND_BASE_URL=https://caldimproducts.com/calrims
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Startup migrations can take 30-60s on first run; give them time before
      # the health-check loop begins to avoid premature "unhealthy" signals.
      start_period: 60s
    restart: always
